<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyteStore 客户资料下载</title>
    <meta name="description" content="KyteStore 面向客户推广、方案交流和 PoC 沟通的资料下载页。">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://kytestore.com/downloads/">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <style>
        :root {
            --bg: #ffffff;
            --panel: #f7f7f8;
            --text: #111111;
            --muted: #6b6f76;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            line-height: 1.65;
        }

        .container {
            width: 100%;
            max-width: 980px;
            margin: 0 auto;
            padding: 0 40px;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.92);
        }

        .logo {
            color: var(--text);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
        }

        .logo span {
            color: var(--muted);
        }

        main {
            padding: 88px 0 120px;
        }

        .eyebrow {
            margin-bottom: 18px;
            color: var(--muted);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            max-width: 760px;
            margin-bottom: 18px;
            font-size: clamp(32px, 5vw, 54px);
            font-weight: 560;
            line-height: 1.08;
        }

        .intro {
            max-width: 720px;
            margin-bottom: 42px;
            color: var(--muted);
            font-size: 17px;
        }

        .download-list {
            display: grid;
            gap: 16px;
        }

        .download-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: center;
            padding: 24px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
        }

        .download-item h2 {
            margin-bottom: 8px;
            font-size: 20px;
            font-weight: 560;
        }

        .download-item p {
            color: var(--muted);
            font-size: 15px;
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 16px;
            border: 1px solid var(--text);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
        }

        .download-link:hover {
            background: var(--text);
            color: var(--bg);
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 32px 0;
            color: var(--muted);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 13px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 0 22px;
            }

            main {
                padding: 64px 0 88px;
            }

            .download-item {
                grid-template-columns: 1fr;
            }

            .download-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a class="logo" href="/">Kyte<span>Store</span></a>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="eyebrow">Customer Downloads</div>
            <h1>KyteStore 客户资料下载</h1>
            <p class="intro">该页面用于存放面向客户沟通、方案推广和 PoC 交流的 PDF 资料。页面不在官网导航中展示，可通过固定 URL 直接访问。</p>

            <div class="download-list">
                <article class="download-item">
                    <div>
                        <h2>面向政府客户的 KyteStore 推广资料</h2>
                        <p>适用于政府行业客户的方案介绍、场景沟通和售前交流。正式 PDF 将在后续制作完成后替换当前占位文件。</p>
                    </div>
                    <a class="download-link" href="/downloads/slides_20260623.pdf">下载 PDF</a>
                </article>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">&copy; 2026 KyteStore. 北京集智创新科技有限公司。</div>
    </footer>
</body>
</html>
