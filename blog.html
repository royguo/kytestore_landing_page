<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="robots" content="index, follow">

    <meta property="og:locale" content="zh_CN">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="KyteStore">
    <meta property="og:title" content="KyteStore 博客">
    <meta property="og:description" content="记录 KyteStore 在 Filesystem 元数据、湖仓系统、AI 训推、S3 与 POSIX 加速方向的架构思考。">

    <style>
        :root {
            --bg-primary: #FDFCF9;
            --bg-secondary: #F7F7F5;
            --bg-tertiary: #F0EFEB;
            --text-primary: #1F1F1F;
            --text-secondary: #3C3C3C;
            --text-muted: #6B6B6B;
            --accent: #2F5F8F;
            --accent-dim: #1E4A6E;
            --border: #E4E4E2;
            --border-strong: #C4C0B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: Georgia, "Times New Roman", Times, serif;
            font-size: 17px;
            line-height: 1.7;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 3px double var(--border-strong);
            padding: 20px 0;
            background: rgba(253, 252, 249, 0.96);
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--text-primary);
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            text-decoration: none;
        }

        .logo span {
            color: var(--accent);
        }

        nav a {
            margin-left: 28px;
            color: var(--text-muted);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-decoration: none;
            text-transform: uppercase;
        }

        nav a:hover,
        nav a.active {
            color: var(--accent);
        }

        #lang-toggle {
            background: none;
            border: 1px solid var(--border-strong);
            color: var(--text-muted);
            cursor: pointer;
            margin-left: 28px;
            font-size: 11px;
            letter-spacing: 0.12em;
            font-family: Arial, Helvetica, sans-serif;
            padding: 4px 10px;
            transition: color 0.2s, border-color 0.2s;
            vertical-align: middle;
        }

        #lang-toggle:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .page-hero {
            padding: 64px 0 36px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            margin-bottom: 18px;
            color: var(--text-muted);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            max-width: 780px;
            margin-bottom: 16px;
            color: var(--text-primary);
            font-size: 46px;
            font-weight: normal;
            line-height: 1.15;
            overflow-wrap: anywhere;
        }

        .intro {
            max-width: 760px;
            color: var(--text-secondary);
            font-size: 18px;
            overflow-wrap: anywhere;
        }

        .blog-list {
            padding: 36px 0 88px;
        }

        .blog-row {
            display: grid;
            grid-template-columns: 180px minmax(0, 1fr);
            gap: 28px;
            padding: 28px 0;
            border-bottom: 1px solid var(--border);
            color: inherit;
            text-decoration: none;
        }

        .blog-row:hover h2 {
            color: var(--accent);
        }

        .blog-meta {
            display: grid;
            gap: 4px;
            color: var(--text-muted);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            line-height: 1.45;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .blog-row h2 {
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 26px;
            font-weight: normal;
            line-height: 1.25;
            transition: color 0.2s;
            overflow-wrap: anywhere;
        }

        .blog-row p {
            max-width: 760px;
            color: var(--text-secondary);
            font-size: 16px;
            overflow-wrap: anywhere;
        }

        footer {
            border-top: 3px double var(--border-strong);
            padding: 36px 0;
            text-align: center;
            color: var(--text-muted);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100vw;
                padding: 0 20px;
            }

            .header-content {
                flex-direction: column;
                gap: 16px;
            }

            nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
                width: calc(100vw - 40px);
                max-width: calc(100vw - 40px);
                align-self: stretch;
            }

            nav a {
                margin-left: 0;
                padding: 5px 7px;
                font-size: 11px;
            }

            #lang-toggle {
                margin-left: 0;
                padding: 5px 7px;
                font-size: 11px;
            }

            .page-hero {
                padding: 48px 0 30px;
            }

            h1 {
                font-size: 34px;
            }

            .blog-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .blog-row h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a class="logo" href="index.html">Kyte<span>Store</span></a>
                <nav aria-label="主导航">
                    <a href="index.html" data-i18n="nav-home">首页</a>
                    <a href="index.html#architecture" data-i18n="nav-architecture">架构</a>
                    <a href="index.html#features" data-i18n="nav-features">功能</a>
                    <a href="index.html#performance" data-i18n="nav-performance">性能</a>
                    <a href="index.html#deployment" data-i18n="nav-deployment">配置</a>
                    <a href="whitepaper.html" data-i18n="nav-docs">文档</a>
                    <a class="active" href="blog.html" aria-current="page" data-i18n="nav-blog">博客</a>
                    <a href="index.html#contact" data-i18n="nav-contact">联系我们</a>
                    <button id="lang-toggle" data-i18n="lang-toggle" onclick="toggleLang()">EN</button>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="page-hero">
            <div class="container">
                <div class="section-title">Blog</div>
                <h1 data-i18n="blog-title">技术博客</h1>
                <p class="intro" data-i18n="blog-intro">KyteStore 团队的一些技术思考都会定期更新在这里。</p>
            </div>
        </section>

        <section class="blog-list" aria-label="博客列表">
            <div class="container">
                <a class="blog-row" href="blog/filesystem-metadata-design.html">
                    <div class="blog-meta">
                        <span data-i18n="post1-category">文件系统</span>
                        <time datetime="2026-05-31">2026-05-31</time>
                    </div>
                    <div>
                        <h2 data-i18n="post1-title">KyteStore 的 Filesystem 元数据方案选型</h2>
                        <p data-i18n="post1-summary">从文件系统元数据的用途、跨分片 rename 难点、主流选型，到 KyteStore inode bucket、3 副本 WAL 与 group commit 的设计取舍。</p>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container" data-i18n="footer-p">&copy; 2024 KyteStore. 高性能对象与文件存储加速。北京集智创新科技有限公司。</div>
    </footer>
    <script>
    (function () {
        var T = {
            en: {
                'page-title': 'KyteStore Blog',
                'nav-home': 'HOME',
                'nav-architecture': 'DESIGN',
                'nav-features': 'FEATURES',
                'nav-performance': 'BENCHMARK',
                'nav-deployment': null,
                'nav-docs': 'DOCS',
                'nav-blog': 'BLOG',
                'nav-contact': 'CONTACT',
                'lang-toggle': '中',
                'blog-title': 'Technical Blog',
                'blog-intro': 'Technical notes and architecture thinking from the KyteStore team are updated here regularly.',
                'post1-category': 'Filesystem',
                'post1-title': 'KyteStore Filesystem Metadata Design Choices',
                'post1-summary': 'A technical look at filesystem metadata, cross-shard rename, mainstream design options, and KyteStore inode buckets, 3-replica WAL, and group commit.',
                'footer-p': '&copy; 2024 KyteStore. High-Performance Object and File Storage Acceleration. JiZhi Innovation Technology Limit.'
            },
            zh: {
                'page-title': 'KyteStore 博客',
                'nav-home': '首页',
                'nav-architecture': '架构',
                'nav-features': '功能',
                'nav-performance': '性能',
                'nav-deployment': '配置',
                'nav-docs': '文档',
                'nav-blog': '博客',
                'nav-contact': '联系我们',
                'lang-toggle': 'EN',
                'blog-title': '技术博客',
                'blog-intro': 'KyteStore 团队的一些技术思考都会定期更新在这里。',
                'post1-category': '文件系统',
                'post1-title': 'KyteStore 的 Filesystem 元数据方案选型',
                'post1-summary': '从文件系统元数据的用途、跨分片 rename 难点、主流选型，到 KyteStore inode bucket、3 副本 WAL 与 group commit 的设计取舍。',
                'footer-p': '&copy; 2024 KyteStore. 高性能对象与文件存储加速。北京集智创新科技有限公司。'
            }
        };

        var lang = localStorage.getItem('ks-lang') || 'zh';

        function applyLang(l) {
            var t = T[l];
            document.querySelectorAll('[data-i18n]').forEach(function (el) {
                var key = el.getAttribute('data-i18n');
                if (t[key] !== undefined) {
                    if (t[key] === null) {
                        el.style.display = 'none';
                    } else {
                        el.style.display = '';
                        el.innerHTML = t[key];
                    }
                }
            });
            document.title = t['page-title'];
            document.documentElement.setAttribute('lang', l === 'zh' ? 'zh-CN' : 'en');
        }

        window.toggleLang = function () {
            lang = lang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('ks-lang', lang);
            applyLang(lang);
        };

        applyLang(lang);
    }());
    </script>
</body>
